appName: "frontend"
namespace: "erp-production"

image:
  repository: hanenall/frontend     
  tag: "12dd793532542decc916e8ad8075a4f7d4f5d315"
  pullPolicy: IfNotPresent     # pas Always → tag unique 

replicaCount: 2

service:
  port: 80
  targetPort: 80             # nginx écoute sur 80 ✅

resources:
  requests:
    memory: "128Mi"          # frontend plus léger que .NET ✅
    cpu: "50m"
  limits:
    memory: "256Mi"
    cpu: "200m"
