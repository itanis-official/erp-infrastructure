appName: "frontend"
namespace: "erp-production"

image:
  repository: hanenall/frontend     
  tag: "9dbac1efc0cf104b48a64000c45fcf91c6028bb6"
  pullPolicy: IfNotPresent     # pas Always → tag unique 

replicaCount: 2

service:
  port: 80
  targetPort: 80             # nginx écoute sur 80 ✅

resources:
  requests:
    memory: "128Mi"          # frontend plus léger que .NET ✅
    cpu: "50m"
  limits:
    memory: "256Mi"
    cpu: "200m"

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

serviceAccount:
  create: true