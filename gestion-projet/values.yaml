appName: "gestion-projet"
namespace: "erp-production"

image:
  repository: hanenall/gestionprojet
  tag: "1ffd3db4d1baf82aff89d55ce42b594d6beb318f"    
  pullPolicy: IfNotPresent

replicaCount: 2

service:
  port: 80
  targetPort: 80

resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"

env:
  aspnetcore_environment: "Production"

authentik:
  apiUrl: "http://authentik-server.authentik.svc.cluster.local"

interServices:
  crm:       "crm-service"
  rh:        "rh-service"
  helpdesk:  "helpdesk-service"
  timesheet: "timesheet-service"
  bi:        "bi-service"