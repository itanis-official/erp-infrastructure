appName: "gestion-projet"
namespace: "erp-production"

image:
  repository: hanenall/gestionprojet
  tag: "4e740ab274175a439d905b91f1948c28c7536577"
  pullPolicy: IfNotPresent

replicaCount: 2

service:
  port: 80
  targetPort: 80

resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

env:
  aspnetcore_environment: "Production"

authentik:
  apiUrl: "http://authentik-server.authentik.svc.cluster.local"

interServices:
  crm:       "crm-service"
  rh:        "rh-service"
  helpdesk:  "helpdesk-service"
  timesheet: "timesheet-service"
  bi:        "bi-service"