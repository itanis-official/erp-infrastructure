appName: "rh"
namespace: "erp-production"

image:
  repository: hanenall/rh
  tag: "d6406924e14f8d4c4d374f068a9f7527e6f94c29"
  pullPolicy: IfNotPresent

replicaCount: 2

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

service:
  port: 80
  targetPort: 80

resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"

env:
  aspnetcore_environment: "Production"

authentik:
  apiUrl: "http://authentik-server.authentik.svc.cluster.local"

ai:
  defaultProvider: "groq"
  publicBaseUrl: "https://erp.itanis.tn"

interServices:
  crm:       "crm-service"
  projet:    "gestion-projet-service"
  helpdesk:  "helpdesk-service"
  timesheet: "timesheet-service"
  bi:        "bi-service"

serviceAccount:
  create: true